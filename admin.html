<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Election Dashboard</title>
    <link rel="stylesheet" href="admin.css?v=3">
</head>
<body>

<div id="loginScreen">
    <h1>🗳️ School Election Dashboard</h1>
    <input id="password" type="password" placeholder="Enter Password">
    <button id="loginBtn">Login</button>
    <p id="error"></p>
</div>

<div id="dashboardScreen" style="display:none;">
    <h1>🗳️ School Election Dashboard</h1>
    
    <div id="dashboard">
        <!-- Setup Card for creating roles -->
        <div class="card creation-card">
            <h2>⚙️ Create Election Roles & Candidates</h2>
            <div class="form-container">
                <input type="text" id="newRoleTitle" placeholder="e.g., Head Boy">
                <input type="text" id="candA" placeholder="Candidate A Name">
                <input type="text" id="candB" placeholder="Candidate B Name">
                <button id="addRoleBtn">Add Position</button>
            </div>
        </div>

        <!-- This MUST exist for the script to attach cards! -->
        <div id="liveResults"></div>
    </div>
</div>

<!-- Incremented to v=3 to completely smash the browser cache -->
<script type="module" src="admin.js?v=3"></script>
</body>
</html>
