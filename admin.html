<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Election Dashboard</title>
    <link rel="stylesheet" href="admin.css?v=6">
</head>
<body>

<div id="loginScreen">
    <h1>🗳️ School Election Dashboard</h1>
    <input id="password" type="password" placeholder="Enter Password">
    <button id="loginBtn">Login</button>
    <p id="error"></p>
</div>

<div id="dashboardScreen" style="display:none;">
    <h1 class="no-print">🗳️ School Election Dashboard</h1>
    
    <!-- 🗂️ Tab Navigation Buttons (Hidden during printing) -->
    <div class="tabs no-print">
        <button id="tabResultsBtn" class="tab-btn active">📈 Dashboard</button>
        <button id="tabSettingsBtn" class="tab-btn">⚙️ Setup</button>
    </div>

    <div id="dashboard">
        <!-- 📈 TAB 1: DASHBOARD (Live Results Only) -->
        <div id="resultsTab" class="tab-content">
            <!-- 📥 Download PDF Action Block -->
            <div style="text-align: right; margin-bottom: 15px;" class="no-print">
                <button id="downloadPdfBtn" style="background-color: #1a237e; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px;">📥 Download Final Results (PDF)</button>
            </div>
            
            <!-- Dynamic Print Header (Invisible on screen, only appears in the PDF) -->
            <div class="print-only-header">
                <h1 style="margin: 0; color: #1a237e;">Official School Election Report</h1>
                <p style="margin: 5px 0 25px 0; color: #555; border-bottom: 2px solid #1a237e; padding-bottom: 10px; font-weight: bold;">Final Certified Election Results Tally</p>
            </div>

            <div id="liveResults"></div>
        </div>

        <!-- ⚙️ TAB 2: SETUP (Management, Editing & Creation) -->
        <div id="settingsTab" class="tab-content hidden">
            <div class="card">
                <h2>➕ Add New Election Position</h2>
                <div class="form-container">
                    <input type="text" id="newRoleTitle" placeholder="e.g., Head Boy">
                    <input type="text" id="candA" placeholder="Candidate A Name">
                    <input type="text" id="candB" placeholder="Candidate B Name">
                    <button id="addRoleBtn">Add Position</button>
                </div>
            </div>

            <div class="card">
                <h2>⚙️ Manage Current Positions & Candidates</h2>
                <p style="color: #666; font-size: 14px; margin-bottom: 15px;">You can update candidate names instantly by typing over them and clicking "Save Names".</p>
                <div id="setupRoleList"></div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="admin.js?v=6"></script>
</body>
</html>
