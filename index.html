<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Electronic Voting System</title>
    <link rel="stylesheet" href="style.css?v=12">
    <style>
        /* This layout ensures perfect symmetry automatically */
        .ballot-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #eef0f5;
            text-align: center;
        }
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
            justify-content: center;
        }
        .candidate-square {
            background: #ffffff;
            border: 2px solid #eef0f5;
            border-radius: 12px;
            padding: 25px 15px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 200px;
            box-sizing: border-box;
        }
        .candidate-square:hover {
            border-color: #1a237e;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(26, 35, 126, 0.08);
        }
        .candidate-avatar {
            font-size: 50px;
            margin-bottom: 10px;
            user-select: none;
        }
        .candidate-name {
            font-size: 20px;
            font-weight: 700;
            color: #333333;
            margin: 5px 0 15px 0;
        }
        .vote-badge {
            background: #f0f2ff;
            color: #1a237e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="voting-container">
    <header class="voting-header">
        <div style="font-size: 40px; margin-bottom: 10px;">🗳️</div>
        <h1>School Election Ballot</h1>
        <p>Please select your preferred candidate for each position below. Cast your vote carefully!</p>
    </header>

    <main id="ballotInterfaceWrapper">
        <!-- Dynamic content layer maps here -->
        <div style="text-align: center; padding: 40px; color: #666;">
            <p>Initializing secure election connection pipelines...</p>
        </div>
    </main>

    <footer class="voting-footer">
        <p>© School Election Commission. Secure Digital Voting Terminal.</p>
    </footer>
</div>

<script type="module" src="app.js?v=12"></script>
</body>
</html>
